<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Notes</title>
  <style>
    :root {
      --bg: #fbfbfa;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --card: #ffffff;
      --border: #ececec;
      --accent: #2a7ae2;
      --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131417;
        --fg: #e9e9ea;
        --muted: #9a9aa2;
        --card: #1c1d21;
        --border: #2a2b31;
        --accent: #6ea8fe;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 20px rgba(0,0,0,.3);
      }
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 46rem; margin: 0 auto; padding: 4rem 1.25rem 6rem; }
    header { margin-bottom: 2.5rem; }
    .home-link {
      display: inline-block; margin-bottom: 1.5rem;
      color: var(--muted); text-decoration: none; font-size: .9rem;
      transition: color .15s ease;
    }
    .home-link:hover { color: var(--accent); }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -.02em; margin: 0 0 .35rem; }
    .subtitle { color: var(--muted); margin: 0; font-size: 1rem; }
    ul { list-style: none; padding: 0; margin: 0; display: grid; gap: .85rem; }
    .note {
      display: block; text-decoration: none; color: inherit;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.1rem 1.25rem;
      box-shadow: var(--shadow);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .note:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 2px 4px rgba(0,0,0,.06), 0 10px 28px rgba(0,0,0,.08);
    }
    .note-title { font-size: 1.15rem; font-weight: 650; margin: 0 0 .15rem; letter-spacing: -.01em; }
    .note-date { color: var(--muted); font-size: .82rem; font-variant-numeric: tabular-nums; }
    .note-summary { color: var(--muted); margin: .4rem 0 0; font-size: .95rem; }
    .empty, .error { color: var(--muted); font-style: italic; }
    .error { color: #c0392b; font-style: normal; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="home-link" href="/">&larr; Home</a>
      <h1>Notes</h1>
      <p class="subtitle">Working notes &amp; scratch pages.</p>
    </header>
    <ul id="notes" aria-live="polite"></ul>
  </div>

  <script>
    // Renders the notes list from the notes.json manifest colocated in this folder.
    // Adding a note = drop a notes/<slug>/ folder + append an entry to notes.json;
    // this page never needs editing.
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    function fmtDate(iso) {
      const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || "");
      if (!m) return iso || "";
      return `${MONTHS[+m[2] - 1]} ${+m[3]}, ${m[1]}`;
    }
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    const list = document.getElementById("notes");
    fetch("notes.json", { cache: "no-cache" })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(notes => {
        notes.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
        if (!notes.length) {
          list.innerHTML = '<li class="empty">No notes yet.</li>';
          return;
        }
        list.innerHTML = notes.map(n => `
          <li>
            <a class="note" href="${esc(n.slug)}/">
              <p class="note-title">${esc(n.title)}</p>
              <span class="note-date">${esc(fmtDate(n.date))}</span>
              ${n.summary ? `<p class="note-summary">${esc(n.summary)}</p>` : ""}
            </a>
          </li>`).join("");
      })
      .catch(() => { list.innerHTML = '<li class="error">Could not load notes.</li>'; });
  </script>
</body>
</html>
